# ROS-Gazebo Bridge Configuration
# This bridges Gazebo topics to ROS2 topics

- ros_topic_name: "/orca4/front_left/image_raw"
  gz_topic_name: "/orca4/front_left/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS


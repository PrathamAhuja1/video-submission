# ROS-Gazebo Bridge Configuration
# Robot name: orca4_ign

# Clock synchronization
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

# IMU sensor data
- ros_topic_name: "/orca4_ign/imu"
  gz_topic_name: "/orca4_ign/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "ignition.msgs.IMU"
  direction: GZ_TO_ROS

# Odometry data (position and velocity feedback)
- ros_topic_name: "/orca4_ign/odom"
  gz_topic_name: "/model/orca4_ign/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

# Front Left Camera
- ros_topic_name: "/orca4_ign/front_left/image_raw"
  gz_topic_name: "/orca4_ign/front_left/image_raw"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "ignition.msgs.Image"
  direction: GZ_TO_ROS

- ros_topic_name: "/orca4_ign/front_left/camera_info"
  gz_topic_name: "/orca4_ign/front_left/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "ignition.msgs.CameraInfo"
  direction: GZ_TO_ROS

